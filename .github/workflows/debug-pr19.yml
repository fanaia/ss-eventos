name: debug-pr19
on:
  push:
    branches: [agent/corrige-subcategoria-ordem-menu]
permissions:
  contents: write
jobs:
  debug:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/corrige-subcategoria-ordem-menu
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - name: Capturar testes
        shell: bash
        run: |
          set +e
          cd backend
          npm test > ../debug-test-output.txt 2>&1
          echo $? > ../debug-test-exit.txt
          exit 0
      - name: Commitar diagnóstico
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add debug-test-output.txt debug-test-exit.txt
          git commit -m "chore: registrar diagnóstico dos testes" || exit 0
          git push