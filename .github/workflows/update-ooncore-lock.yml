name: update-ooncore-lock

on:
  push:
    branches:
      - feat/adotar-acoes-operacionais-core
    paths:
      - frontend/package.json
      - .github/workflows/update-ooncore-lock.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: feat/adotar-acoes-operacionais-core

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Atualizar lockfile do frontend
        working-directory: frontend
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commitar lockfile gerado
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- frontend/package-lock.json; then
            echo "Lockfile já está atualizado."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/package-lock.json
          git commit -m "chore(frontend): atualizar lockfile do OonCore 0.3.34"
          git push origin HEAD:feat/adotar-acoes-operacionais-core