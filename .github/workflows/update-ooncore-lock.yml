name: update-ooncore-lock

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  update-lockfiles:
    if: github.head_ref == 'agent/update-ooncore-0.3.32'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Atualizar lockfile do backend
        run: npm install --prefix backend --package-lock-only --ignore-scripts

      - name: Atualizar lockfile do frontend
        run: npm install --prefix frontend --package-lock-only --ignore-scripts

      - name: Confirmar versões instaladas
        run: |
          node -e "const lock=require('./backend/package-lock.json'); const version=lock.packages['node_modules/@oondemand/oon-core-back']?.version; if(version!=='0.3.32') throw new Error('oon-core-back esperado 0.3.32, encontrado '+version);"
          node -e "const lock=require('./frontend/package-lock.json'); const version=lock.packages['node_modules/@oondemand/oon-core-front']?.version; if(version!=='0.3.32') throw new Error('oon-core-front esperado 0.3.32, encontrado '+version);"

      - name: Validar backend
        run: |
          npm ci --prefix backend --ignore-scripts
          npm test --prefix backend

      - name: Validar frontend
        run: |
          npm ci --prefix frontend --ignore-scripts
          npm run build --prefix frontend

      - name: Registrar lockfiles e remover workflow auxiliar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/update-ooncore-lock.yml
          git add backend/package.json backend/package-lock.json frontend/package.json frontend/package-lock.json
          git commit -m "chore: atualizar lockfiles do oonCore para 0.3.32"
          git push origin HEAD:${{ github.head_ref }}
