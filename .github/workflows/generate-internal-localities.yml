name: generate-internal-localities

on:
  push:
    branches:
      - feat/filtros-referencias-projeto
    paths:
      - .github/workflows/generate-internal-localities.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: feat/filtros-referencias-projeto
          fetch-depth: 0

      - name: Baixar e validar localidades oficiais do IBGE
        run: |
          python <<'PY'
          import json
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          ESTADOS_URL = "https://servicodados.ibge.gov.br/api/v1/localidades/estados?orderBy=nome"
          MUNICIPIOS_URL = "https://servicodados.ibge.gov.br/api/v1/localidades/municipios?orderBy=nome"

          def carregar(url):
              request = urllib.request.Request(url, headers={"User-Agent": "ss-eventos-localidades/1.0"})
              with urllib.request.urlopen(request, timeout=120) as response:
                  return json.load(response)

          estados_origem = carregar(ESTADOS_URL)
          municipios_origem = carregar(MUNICIPIOS_URL)

          estados = sorted(
              [
                  {
                      "codigoIbge": str(estado["id"]),
                      "uf": estado["sigla"],
                      "nome": estado["nome"],
                  }
                  for estado in estados_origem
              ],
              key=lambda item: item["nome"],
          )

          cidades = sorted(
              [
                  {
                      "codigoIbge": str(municipio["id"]),
                      "codigoUf": str(municipio["id"])[:2],
                      "nome": municipio["nome"],
                  }
                  for municipio in municipios_origem
              ],
              key=lambda item: (item["codigoUf"], item["nome"]),
          )

          if len(estados) != 27:
              raise SystemExit(f"Quantidade inesperada de estados: {len(estados)}")
          if len(cidades) < 5500:
              raise SystemExit(f"Quantidade inesperada de municípios: {len(cidades)}")

          codigos_estados = {item["codigoIbge"] for item in estados}
          if len(codigos_estados) != len(estados):
              raise SystemExit("Códigos de estado duplicados.")
          if len({item["codigoIbge"] for item in cidades}) != len(cidades):
              raise SystemExit("Códigos de município duplicados.")

          cidades_sem_estado = [item for item in cidades if item["codigoUf"] not in codigos_estados]
          if cidades_sem_estado:
              raise SystemExit(f"Municípios sem UF válida: {cidades_sem_estado[:3]}")

          destino = Path("backend/src/data/localidades-brasil.json")
          destino.parent.mkdir(parents=True, exist_ok=True)
          destino.write_text(
              json.dumps(
                  {
                      "fonte": "Serviço de Dados do IBGE - API de Localidades",
                      "fonteEstados": ESTADOS_URL,
                      "fonteMunicipios": MUNICIPIOS_URL,
                      "geradoEm": datetime.now(timezone.utc).isoformat(),
                      "estados": estados,
                      "cidades": cidades,
                  },
                  ensure_ascii=False,
                  separators=(",", ":"),
              ) + "\n",
              encoding="utf-8",
          )

          manifesto_path = Path("frontend/central.ui.json")
          manifesto = json.loads(manifesto_path.read_text(encoding="utf-8"))
          manifesto["collections"] = [
              colecao
              for colecao in manifesto.get("collections", [])
              if colecao.get("model") not in {"Estado", "Cidade"}
          ]
          manifesto_path.write_text(
              json.dumps(manifesto, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8")
          readme = readme.replace(
              "- **Estados/Cidades**: listas internas relacionadas para uso nos itens do projeto.",
              "- **Estados/Cidades**: lista interna oficial do IBGE, sincronizada automaticamente e disponível somente para seleção nos itens do projeto.",
          )
          readme_path.write_text(readme, encoding="utf-8")

          print(f"Gerados {len(estados)} estados e {len(cidades)} municípios.")
          PY

      - name: Executar testes do backend
        working-directory: backend
        run: |
          npm ci
          npm test

      - name: Commitar dados e remover workflow temporário
        run: |
          rm .github/workflows/generate-internal-localities.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/src/data/localidades-brasil.json frontend/central.ui.json README.md .github/workflows/generate-internal-localities.yml
          git commit -m "feat(localidades): incorporar estados e municípios do IBGE"
          git push origin HEAD:feat/filtros-referencias-projeto
