name: update-ooncore-0.3.29-lockfiles

on:
  push:
    branches:
      - feat/itens-projeto-abas
    paths:
      - backend/package.json
      - frontend/package.json
      - .github/workflows/update-ooncore-0.3.29-lockfiles.yml

permissions:
  contents: write

jobs:
  lockfiles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: feat/itens-projeto-abas
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Regenerar lockfile do backend
        working-directory: backend
        run: npm install --package-lock-only --ignore-scripts

      - name: Regenerar lockfile do frontend
        working-directory: frontend
        run: npm install --package-lock-only --ignore-scripts

      - name: Remover workflow temporário e publicar lockfiles
        run: |
          rm .github/workflows/update-ooncore-0.3.29-lockfiles.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/package-lock.json frontend/package-lock.json .github/workflows/update-ooncore-0.3.29-lockfiles.yml
          if git diff --cached --quiet; then
            echo "Nenhuma alteração de lockfile necessária."
            exit 0
          fi
          git commit -m "chore: atualizar lockfiles do OonCore 0.3.29"
          git push origin HEAD:feat/itens-projeto-abas
