name: update-ooncore-lockfiles

on:
  push:
    branches:
      - agent/reference-labels-grids-cards
    paths:
      - backend/package.json
      - frontend/package.json
      - .github/workflows/update-ooncore-lockfiles.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/reference-labels-grids-cards

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Aguardar OonCore 0.3.33 no npm
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            back=$(npm view @oondemand/oon-core-back@0.3.33 version 2>/dev/null || true)
            front=$(npm view @oondemand/oon-core-front@0.3.33 version 2>/dev/null || true)
            if [[ "$back" == "0.3.33" && "$front" == "0.3.33" ]]; then
              exit 0
            fi
            echo "Aguardando publicação do OonCore 0.3.33 (${attempt}/36)..."
            sleep 5
          done
          echo "OonCore 0.3.33 não ficou disponível no prazo esperado." >&2
          exit 1

      - name: Atualizar lockfile do backend
        working-directory: backend
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Atualizar lockfile do frontend
        working-directory: frontend
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commitar lockfiles
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Lockfiles já estão atualizados."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/package-lock.json frontend/package-lock.json
          git commit -m "chore: atualizar lockfiles do OonCore 0.3.33"
          git push origin HEAD:agent/reference-labels-grids-cards
